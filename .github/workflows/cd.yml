name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Deployment smoke test
        run: |
          HOST=127.0.0.1 \
          PORT=4176 \
          TASKGARDEN_TODOS_PATH=./ops/example-data/todos.json \
          SESSIONS_PATH=./ops/example-data/sessions.json \
          node server.mjs &
          echo $! > clawpoint.pid
          trap 'kill $(cat clawpoint.pid) || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4176/api/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          npm run smoke

      - name: Prepare release bundle
        run: npm run release:prepare

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: clawpoint-production-bundle-${{ github.sha }}
          path: .release/clawpoint
