name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build app
        run: npm run build

      - name: Build production image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} -t ghcr.io/${{ github.repository }}:latest .

      - name: Deployment smoke test
        run: |
          docker run -d --rm --name clawpoint-prod -p 4176:4176 ghcr.io/${{ github.repository }}:${{ github.sha }}
          trap 'docker logs clawpoint-prod || true; docker stop clawpoint-prod || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4176/api/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          npm run smoke

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push production image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
