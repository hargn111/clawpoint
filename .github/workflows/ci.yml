name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Start production-style server
        run: |
          HOST=127.0.0.1 \
          PORT=4176 \
          TASKGARDEN_TODOS_PATH=./ops/example-data/todos.json \
          SESSIONS_PATH=./ops/example-data/sessions.json \
          node server.mjs &
          echo $! > clawpoint.pid

      - name: Production smoke test
        run: |
          trap 'kill $(cat clawpoint.pid) || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4176/api/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          npm run smoke

      - name: Prepare release bundle
        run: npm run release:prepare

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: clawpoint-release-bundle
          path: .release/clawpoint
